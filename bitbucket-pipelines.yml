image: node:lts

definitions:
  caches:
    node-modules: node_modules

pipelines:
  branches:
    develop:
      - step:
          name: Install dependencies
          working_directory: $WORKDIR_PRIVATE
          caches:
            - node-modules
          script:
            - yarn install
      - step:
          name: Test
          working_directory: $WORKDIR_PRIVATE
          caches:
            - node-modules
          script:
            - yarn test:CI
      - step:
          name: Build
          working_directory: $WORKDIR_PRIVATE
          caches:
            - node-modules
          script:
            - yarn build
          artifacts:
            - build/**
      - step:
          name: Deploy to FA Back
          working_directory: $WORKDIR_PRIVATE
          script:
            - apt-get update
            - apt-get install -y zip
            - cd build && zip -r build.zip ./*
            - apt-get install -y curl
            - >
              IFS=',' read -ra ENV_ARRAY <<< "$TARGET_ENVIRONMENTS"
              for ENV in "${ENV_ARRAY[@]}"
              do
                echo "Deploying to $ENV"
                VALUE="${ENV}_API_TOKEN_VALUE"
                NAME="${ENV}_API_TOKEN_NAME"
                curl -f -X POST
                -H "fa-token-name: ${!NAME}"
                -H "fa-token-value: ${!VALUE}"
                -H "Content-Type: application/zip"
                --data-binary "@build.zip"
                https://$ENV.fasolutions.com/rs/secure/fa/api/v1.0/upload/clientportalZip
              done
