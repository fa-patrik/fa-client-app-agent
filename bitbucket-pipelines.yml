image: node:lts

definitions:
  caches:
    node-modules-cache: node_modules

pipelines:
  branches:
    CICD-12:
      - step:
          name: Install dependencies
          working_directory: fa-client-app-private
          caches:
            - node-modules-cache
          script:
            - yarn install
      - step:
          name: Test and build
          working_directory: fa-client-app-private
          caches:
            - node-modules-cache
          script:
            - yarn build
          artifacts:
            - build/**
      - step:
          name: Deploy to FA Back
          working_directory: fa-client-app-private
          script:
            - apt-get update
            - apt-get install -y zip
            - zip -r build.zip build
            - apt-get install -y curl
            - echo "Deploying to $TARGET_ENVIRONMENT"
            - >
              curl -f -X POST
              -H "fa-token-name: $API_TOKEN_NAME"
              -H "fa-token-value: $API_TOKEN_VALUE"
              -H "Content-Type: application/zip"
              --data-binary "@build.zip"
              https://$TARGET_ENVIRONMENT.fasolutions.com/rs/secure/fa/api/v1.0/upload/clientportalZip